name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key OK"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 root@72.61.42.11 bash <<'EOF'
            set -e
            cd /opt/duckfinance
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker compose exec -T backend npx drizzle-kit push --force || true
            docker image prune -f
            docker compose ps
          EOF
